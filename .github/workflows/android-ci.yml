name: Android CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "gradle/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "gradle/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, build, render
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 36 platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle 9.4.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Lint, test, assemble, and render
        run: gradle --no-daemon --stacktrace lintDebug testDebugUnitTest assembleDebug renderUiBaselines

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podcast-clips-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podcast-clips-verification
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/tests/
            app/build/test-results/
            app/build/reports/ui-baselines/
          if-no-files-found: warn
          retention-days: 14
