name: Android CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "gradle/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "gradle/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, build, render
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g

    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Install Android 36 platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle 9.4.1
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a
        with:
          gradle-version: "9.4.1"
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Lint, test, assemble, and render
        run: gradle --no-daemon --stacktrace lintDebug testDebugUnitTest assembleDebug renderUiBaselines

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: podcast-clips-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: podcast-clips-verification
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/tests/
            app/build/test-results/
            app/build/reports/ui-baselines/
          if-no-files-found: warn
          retention-days: 14

  device-smoke:
    name: Emulator smoke test
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.4.1
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a
        with:
          gradle-version: "9.4.1"

      - name: Launch app and navigate primary screens
        uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: gradle --no-daemon connectedDebugAndroidTest
