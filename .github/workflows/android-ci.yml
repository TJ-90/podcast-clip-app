name: Android CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "gradle/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "gradle/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, build, secure, package
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g

    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Install Android 36 platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle 9.4.1
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a
        with:
          gradle-version: "9.4.1"
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Lint, test, assemble, and render
        run: gradle --no-daemon --stacktrace lintDebug testDebugUnitTest assembleDebug renderUiBaselines

      - name: Analyze Kotlin and Java
        uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26
        with:
          category: /language:java-kotlin

      - name: Scan tracked source for committed credentials
        shell: bash
        run: |
          set -euo pipefail
          if git grep -nEI 'gsk_[A-Za-z0-9]{20,}|AIza[0-9A-Za-z_-]{30,}|BEGIN (RSA|EC|OPENSSH) PRIVATE KEY' -- .; then
            echo "Potential committed credential detected"
            exit 1
          fi

      - name: Create checksum and dependency evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p app/build/reports/package
          sha256sum app/build/outputs/apk/debug/app-debug.apk             > app/build/reports/package/app-debug.apk.sha256
          gradle --no-daemon :app:dependencies --configuration debugRuntimeClasspath             > app/build/reports/package/debug-runtime-dependencies.txt
          git ls-files -z | sort -z | xargs -0 sha256sum             > app/build/reports/package/tracked-source.sha256

      - name: Generate APK SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          file: app/build/outputs/apk/debug/app-debug.apk
          format: spdx-json
          output-file: app/build/reports/package/podcast-clips.spdx.json
          upload-artifact: false

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: podcast-clips-debug-apk
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/reports/package/app-debug.apk.sha256
          if-no-files-found: warn
          retention-days: 14

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: podcast-clips-verification
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/tests/
            app/build/test-results/
            app/build/reports/ui-baselines/
            app/build/reports/package/
          if-no-files-found: warn
          retention-days: 14

  device-smoke:
    name: Emulator behavior and visual smoke
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 9.4.1
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a
        with:
          gradle-version: "9.4.1"

      - name: Enable emulator hardware acceleration
        run: sudo chmod 0666 /dev/kvm

      - name: Run behavior tests and capture the app
        uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            gradle --no-daemon connectedDebugAndroidTest
            gradle --no-daemon installDebug
            adb shell am start -n com.tj90.podcastclip/.MainActivity
            sleep 3
            mkdir -p app/build/reports/device-smoke
            adb exec-out screencap -p > app/build/reports/device-smoke/home.png

      - name: Upload device evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: podcast-clips-device-evidence
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
            app/build/reports/device-smoke/
          if-no-files-found: warn
          retention-days: 14