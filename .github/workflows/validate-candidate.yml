name: Validate exact candidate

on:
  workflow_dispatch:
    inputs:
      candidate:
        description: Candidate identity
        type: choice
        required: true
        options:
          - podaura
          - antennapod
      candidate_sha:
        description: Exact 40-character candidate commit
        type: string
        required: true
      dispatch_index:
        description: Counted candidate dispatch (1..3)
        type: string
        required: true

concurrency:
  group: candidate-${{ inputs.candidate_sha }}-${{ inputs.dispatch_index }}
  cancel-in-progress: false

permissions: {}

jobs:
  validate:
    name: exact-SHA candidate check
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions: {}
    env:
      CANDIDATE: ${{ inputs.candidate }}
      CANDIDATE_SHA: ${{ inputs.candidate_sha }}
      DISPATCH_INDEX: ${{ inputs.dispatch_index }}
    steps:
      - name: Validate immutable inputs
        shell: bash
        run: |
          [[ "$CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$DISPATCH_INDEX" =~ ^[1-3]$ ]]

      - name: Fetch exact public candidate without credentials
        shell: bash
        run: |
          git -c credential.helper= init candidate
          git -C candidate remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -C candidate -c credential.helper= fetch --no-tags --depth=1 origin "$CANDIDATE_SHA"
          git -C candidate checkout --detach FETCH_HEAD
          test "$(git -C candidate rev-parse HEAD)" = "$CANDIDATE_SHA"
          test -z "$(git -C candidate config --get credential.helper || true)"
          git -C candidate remote remove origin

      - name: Verify identity, quarantine, design ancestry, and capability prerequisites
        id: audit
        continue-on-error: true
        shell: bash
        run: |
          python3 candidate/scripts/ci/audit_candidate.py \
            --candidate "$CANDIDATE" \
            --root candidate \
            --output "$RUNNER_TEMP/capability-report.json"

      - name: Set up PodAura JDK
        if: inputs.candidate == 'podaura'
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: zulu
          java-version: '25'

      - name: Set up AntennaPod JDK
        if: inputs.candidate == 'antennapod'
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Install exact Android toolchain components on the fresh runner
        shell: bash
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [[ "$CANDIDATE" == podaura ]]; then
            yes | "$SDKMANAGER" --licenses >/dev/null || true
            "$SDKMANAGER" 'platforms;android-37' 'build-tools;37.0.0' 'ndk;29.0.14206865'
          else
            yes | "$SDKMANAGER" --licenses >/dev/null || true
            "$SDKMANAGER" 'platforms;android-36'
          fi

      - name: Clean Android assemble, unit, lint, and native packaging
        id: android
        shell: bash
        working-directory: candidate
        run: |
          export GRADLE_USER_HOME="$RUNNER_TEMP/gradle-empty"
          rm -rf "$GRADLE_USER_HOME"
          mkdir -p "$GRADLE_USER_HOME"
          if [[ "$CANDIDATE" == podaura ]]; then
            java -classpath gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain \
              --no-daemon --no-build-cache --no-configuration-cache \
              :platform:android:app:assembleGitHubDebug \
              :platform:android:app:testGitHubDebugUnitTest \
              :platform:android:app:lintGitHubDebug
          else
            java -classpath gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain \
              --no-daemon --no-build-cache --no-configuration-cache \
              -Pandroid.useAndroidX=true \
              -Pandroid.nonTransitiveRClass=false \
              :app:assembleFreeDebug \
              :app:testFreeDebugUnitTest \
              :app:lintFreeDebug
          fi

      - name: Enforce both admission axes
        if: always()
        shell: bash
        env:
          AUDIT_OUTCOME: ${{ steps.audit.outcome }}
          ANDROID_OUTCOME: ${{ steps.android.outcome }}
        run: |
          {
            echo '## Exact candidate validation'
            echo
            echo "- Identity: \`$CANDIDATE_SHA\`"
            echo "- Dispatch: $DISPATCH_INDEX of 3"
            echo "- Capability/provenance audit: $AUDIT_OUTCOME"
            echo "- Clean Android assemble/unit/lint/native packaging: $ANDROID_OUTCOME"
            echo '- Gradle cache: empty; build cache and configuration cache disabled'
            echo '- Repository/provider secrets: none; repository token permissions: empty'
          } >> "$GITHUB_STEP_SUMMARY"
          test "$AUDIT_OUTCOME" = success
          test "$ANDROID_OUTCOME" = success

  report:
    name: trusted exact-SHA reporter
    if: always()
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    permissions:
      checks: write
      contents: read
    steps:
      - name: Verify check association and publish allowlisted conclusion
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          VALIDATION_RESULT: ${{ needs.validate.result }}
          DISPATCH_INDEX: ${{ inputs.dispatch_index }}
        shell: bash
        run: |
          [[ "$CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]]
          gh api "repos/${GITHUB_REPOSITORY}/commits/${CANDIDATE_SHA}" --jq .sha | grep -Fx "$CANDIDATE_SHA"
          if [[ "$VALIDATION_RESULT" == success ]]; then conclusion=success; else conclusion=failure; fi
          summary="Exact-SHA validation result: ${VALIDATION_RESULT}; dispatch ${DISPATCH_INDEX}/3. Reporter did not check out or execute candidate content."
          jq -n \
            --arg name "candidate-validation/${DISPATCH_INDEX}" \
            --arg head_sha "$CANDIDATE_SHA" \
            --arg conclusion "$conclusion" \
            --arg title "Candidate validation ${VALIDATION_RESULT}" \
            --arg summary "$summary" \
            '{name:$name,head_sha:$head_sha,status:"completed",conclusion:$conclusion,output:{title:$title,summary:$summary}}' \
            | gh api --method POST "repos/${GITHUB_REPOSITORY}/check-runs" --input -
